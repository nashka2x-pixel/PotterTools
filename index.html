<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PotterTools</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4eadf;
      color: #2d2118;
      padding: 14px;
    }

    .app {
      max-width: 480px;
      margin: auto;
      padding-bottom: 30px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab {
      height: 64px;
      padding: 0;
      border-radius: 20px;
      border: 1px solid #ead9c8;
      background: #fffaf4;
      box-shadow: 0 6px 18px rgba(70, 45, 25, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab svg {
      width: 32px;
      height: 32px;
      fill: #8f5130;
    }

    .tab.active {
      background: #b86f45;
    }

    .tab.active svg {
      fill: white;
    }

    .card {
      background: #fffaf4;
      border: 1px solid #ead9c8;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(70, 45, 25, 0.08);
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input, select, button {
      width: 100%;
      font-size: 18px;
      border-radius: 14px;
      border: 1px solid #d9c4b2;
      padding: 14px;
      background: white;
    }

    button {
      border: none;
      background: #b86f45;
      color: white;
      font-weight: 800;
      margin-top: 14px;
      cursor: pointer;
    }

    button.secondary {
      background: #ead9c8;
      color: #2d2118;
    }

    button.danger {
      background: #8f3f2f;
    }

    .mode {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode button {
      margin: 0;
      font-size: 15px;
      padding: 12px;
      background: #ead9c8;
      color: #2d2118;
    }

    .mode button.active {
      background: #b86f45;
      color: white;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      padding-right: 58px;
    }

    .input-unit {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 800;
      color: #7b6657;
    }

    .result {
      min-height: 150px;
      padding: 24px;
      background: #f1dfcd;
      border-radius: 18px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .result-label {
      font-size: 15px;
      color: #7b6657;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .result .big {
      font-size: 46px;
      font-weight: 900;
      color: #8f5130;
      line-height: 1;
    }

    .unit {
      font-size: 24px;
      font-weight: 800;
    }

    .small {
      font-size: 14px;
      color: #7b6657;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }

    .clay-item {
      background: #fff;
      border: 1px solid #ead9c8;
      border-radius: 16px;
      padding: 12px;
      margin-top: 10px;
      font-size: 15px;
    }

    .clay-item strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .history-item {
      background: #fff;
      border: 1px solid #ead9c8;
      border-radius: 18px;
      padding: 14px;
      margin-top: 10px;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .history-clay {
      font-weight: 900;
      font-size: 16px;
    }

    .badge {
      background: #f1dfcd;
      color: #6b3f28;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .history-phrase {
      font-size: 16px;
      line-height: 1.55;
      color: #2d2118;
      margin: 8px 0;
    }

    .history-phrase strong {
      color: #8f5130;
      font-size: 18px;
    }

    .history-date {
      color: #7b6657;
      font-size: 13px;
      margin-top: 8px;
    }

    .tiny-btn {
      font-size: 13px;
      padding: 8px 10px;
      margin-top: 8px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <main class="app">

    <nav class="tabs">
      <button class="tab active" onclick="showPage('calc')" id="tabCalc" aria-label="Calcul">
        <svg viewBox="0 0 24 24">
          <path d="M6 3h12v3c0 1.7-.9 3.2-2.2 4 1.9 1.1 3.2 3.2 3.2 5.5A5.5 5.5 0 0 1 13.5 21h-3A5.5 5.5 0 0 1 5 15.5c0-2.3 1.3-4.4 3.2-5.5A4.8 4.8 0 0 1 6 6V3Zm2 2v1c0 1.7 1.3 3 3 3h2c1.7 0 3-1.3 3-3V5H8Zm2.5 6A3.5 3.5 0 0 0 7 14.5V16a3 3 0 0 0 3 3h4a3 3 0 0 0 3-3v-1.5a3.5 3.5 0 0 0-3.5-3.5h-3Z"/>
        </svg>
      </button>

      <button class="tab" onclick="showPage('clays')" id="tabClays" aria-label="Ajouter une terre">
        <svg viewBox="0 0 24 24">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2Z"/>
        </svg>
      </button>

      <button class="tab" onclick="showPage('history')" id="tabHistory" aria-label="Historique">
        <svg viewBox="0 0 24 24">
          <path d="M13 3a9 9 0 1 1-8.5 6H2l3.3-3.3L8.6 9H6.6A7 7 0 1 0 13 5V3Zm-1 5h2v5l4 2-.9 1.6-5.1-3V8Z"/>
        </svg>
      </button>
    </nav>

    <section id="pageCalc" class="card">
      <div class="mode">
        <button id="modeFreshToFinal" class="active">Fraîche → finale</button>
        <button id="modeFinalToFresh">Finale → fraîche</button>
      </div>

      <label for="claySelect">Terre</label>
      <select id="claySelect"></select>

      <label id="sizeLabel" for="sizeInput">Taille fraîche</label>
      <div class="input-wrap">
        <input id="sizeInput" type="number" inputmode="decimal" placeholder="Ex : 14" />
        <span class="input-unit">cm</span>
      </div>

      <label for="shrinkInput">Taux de retrait</label>
      <div class="input-wrap">
        <input id="shrinkInput" type="number" inputmode="decimal" placeholder="Ex : 12" />
        <span class="input-unit">%</span>
      </div>

      <button onclick="calculate()">Calculer</button>

      <div class="result" id="result">
        <div class="big">— <span class="unit">cm</span></div>
      </div>

      <button class="secondary" onclick="saveHistory()">Enregistrer dans l’historique</button>
    </section>

    <section id="pageClays" class="card hidden">
      <h2>Mes terres</h2>

      <label for="newClayName">Nom de la terre</label>
      <input id="newClayName" placeholder="Ex : Grès blanc" />

      <label for="newClayShrink">Retrait</label>
      <div class="input-wrap">
        <input id="newClayShrink" type="number" inputmode="decimal" placeholder="Ex : 12" />
        <span class="input-unit">%</span>
      </div>

      <button onclick="saveClay()">Ajouter / enregistrer</button>

      <div id="clayList"></div>
    </section>

    <section id="pageHistory" class="card hidden">
      <h2>Historique</h2>
      <button class="danger" onclick="clearHistory()">Vider l’historique</button>
      <div id="historyList"></div>
    </section>

  </main>

  <script>
    let mode = "freshToFinal";
    let lastCalculation = null;

    const defaultClays = [
      { name: "Terre standard", shrink: 12 }
    ];

    function showPage(page) {
      document.getElementById("pageCalc").classList.toggle("hidden", page !== "calc");
      document.getElementById("pageClays").classList.toggle("hidden", page !== "clays");
      document.getElementById("pageHistory").classList.toggle("hidden", page !== "history");

      document.getElementById("tabCalc").classList.toggle("active", page === "calc");
      document.getElementById("tabClays").classList.toggle("active", page === "clays");
      document.getElementById("tabHistory").classList.toggle("active", page === "history");
    }

    function getClays() {
      return JSON.parse(localStorage.getItem("clays")) || defaultClays;
    }

    function setClays(clays) {
      localStorage.setItem("clays", JSON.stringify(clays));
    }

    function getHistory() {
      return JSON.parse(localStorage.getItem("history")) || [];
    }

    function setHistory(history) {
      localStorage.setItem("history", JSON.stringify(history));
    }

    function renderClays() {
      const clays = getClays();
      const select = document.getElementById("claySelect");
      const list = document.getElementById("clayList");

      select.innerHTML = "";
      list.innerHTML = "";

      clays.forEach((clay, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = `${clay.name} — ${clay.shrink}%`;
        select.appendChild(option);

        const div = document.createElement("div");
        div.className = "clay-item";
        div.innerHTML = `
          <strong>${clay.name}</strong>
          Retrait : ${clay.shrink} %
          <button class="tiny-btn danger" onclick="deleteClay(${index})">Supprimer</button>
        `;
        list.appendChild(div);
      });

      if (clays.length > 0) {
        document.getElementById("shrinkInput").value = clays[0].shrink;
      }
    }

    document.getElementById("claySelect").addEventListener("change", function() {
      const clays = getClays();
      const clay = clays[this.value];

      if (clay) {
        document.getElementById("shrinkInput").value = clay.shrink;
      }
    });

    function saveClay() {
      const name = document.getElementById("newClayName").value.trim();
      const shrink = parseFloat(document.getElementById("newClayShrink").value);

      if (!name || isNaN(shrink) || shrink <= 0 || shrink >= 100) {
        alert("Entre un nom de terre et un retrait valide.");
        return;
      }

      const clays = getClays();
      const existing = clays.findIndex(c => c.name.toLowerCase() === name.toLowerCase());

      if (existing >= 0) {
        clays[existing].shrink = shrink;
      } else {
        clays.push({ name, shrink });
      }

      setClays(clays);

      document.getElementById("newClayName").value = "";
      document.getElementById("newClayShrink").value = "";

      renderClays();
      showPage("calc");
    }

    function deleteClay(index) {
      const clays = getClays();
      clays.splice(index, 1);
      setClays(clays.length ? clays : defaultClays);
      renderClays();
    }

    function setMode(newMode) {
      mode = newMode;

      document.getElementById("modeFreshToFinal").classList.toggle("active", mode === "freshToFinal");
      document.getElementById("modeFinalToFresh").classList.toggle("active", mode === "finalToFresh");

      document.getElementById("sizeLabel").textContent =
        mode === "freshToFinal" ? "Taille fraîche" : "Taille finale voulue";

      document.getElementById("result").innerHTML = `
        <div class="big">— <span class="unit">cm</span></div>
      `;
    }

    document.getElementById("modeFreshToFinal").onclick = () => setMode("freshToFinal");
    document.getElementById("modeFinalToFresh").onclick = () => setMode("finalToFresh");

    function calculate() {
      const size = parseFloat(document.getElementById("sizeInput").value);
      const shrink = parseFloat(document.getElementById("shrinkInput").value);
      const clays = getClays();
      const clay = clays[document.getElementById("claySelect").value];

      if (isNaN(size) || isNaN(shrink) || shrink <= 0 || shrink >= 100) {
        alert("Entre une taille et un taux de retrait valide.");
        return;
      }

      const factor = 1 - shrink / 100;
      let result;
      let label;

      if (mode === "freshToFinal") {
        result = size * factor;
        label = "Taille finale estimée";
      } else {
        result = size / factor;
        label = "Taille fraîche à faire";
      }

      result = Math.round(result * 100) / 100;

      document.getElementById("result").innerHTML = `
        <div class="result-label">${label}</div>
        <div class="big">${result} <span class="unit">cm</span></div>
        <div class="small">avec ${shrink} % de retrait</div>
      `;

      lastCalculation = {
        clay: clay ? clay.name : "Terre inconnue",
        shrink,
        mode,
        input: size,
        result,
        date: new Date().toLocaleString("fr-FR")
      };
    }

    function saveHistory() {
      if (!lastCalculation) {
        alert("Fais d’abord un calcul.");
        return;
      }

      const history = getHistory();
      history.unshift(lastCalculation);
      setHistory(history.slice(0, 30));
      renderHistory();
      showPage("history");
    }

    function renderHistory() {
      const history = getHistory();
      const list = document.getElementById("historyList");

      if (history.length === 0) {
        list.innerHTML = `<p class="small">Aucun calcul enregistré.</p>`;
        return;
      }

      list.innerHTML = "";

      history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";

        let phrase = "";

        if (item.mode === "freshToFinal") {
          phrase = `
            Taille fraîche <strong>${item.input} cm</strong><br>
            → Taille finale estimée <strong>${item.result} cm</strong>
          `;
        } else {
          phrase = `
            Taille finale voulue <strong>${item.input} cm</strong><br>
            → Taille fraîche à faire <strong>${item.result} cm</strong>
          `;
        }

        div.innerHTML = `
          <div class="history-top">
            <div class="history-clay">${item.clay}</div>
            <div class="badge">${item.shrink} %</div>
          </div>

          <div class="history-phrase">
            ${phrase}
          </div>

          <div class="history-date">${item.date}</div>
        `;

        list.appendChild(div);
      });
    }

    function clearHistory() {
      if (confirm("Vider tout l’historique ?")) {
        localStorage.removeItem("history");
        renderHistory();
      }
    }

    renderClays();
    renderHistory();
  </script>
</body>
</html>
