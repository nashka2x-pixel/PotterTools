<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PotterTools</title>

<style>
:root {
  --bg:#fff5ea;
  --paper:#fffaf4;
  --paper2:#f8eadb;
  --line:#e4cbb5;
  --text:#2f2118;
  --muted:#806755;
  --accent:#c96632;
  --accent2:#de8a55;
  --accent-dark:#8e431f;
  --danger:#a14f42;
}

* { box-sizing:border-box; }

body {
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 20%, rgba(180,110,60,.08) 1px, transparent 1px),
    radial-gradient(circle at 80% 70%, rgba(180,110,60,.06) 1px, transparent 1px),
    var(--bg);
  background-size:20px 20px;
}

.app {
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding:18px 14px 28px;
}

/* TOP NAV */
.top-nav {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:22px;
  padding-top:8px;
}

.nav-btn {
  background:transparent;
  border:none;
  padding:0;
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

.nav-icon {
  width:58px;
  height:58px;
  border-radius:50%;
  background:#f6e7d8;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 18px rgba(110,70,40,.10);
}

.nav-icon svg {
  width:30px;
  height:30px;
  fill:#5b3926;
}

.nav-btn.active {
  color:var(--accent-dark);
}

.nav-btn.active .nav-icon {
  background:linear-gradient(160deg,var(--accent2),var(--accent));
}

.nav-btn.active svg {
  fill:white;
}

.nav-btn.active::after {
  content:"";
  width:76px;
  height:3px;
  border-radius:99px;
  background:var(--accent);
  margin-top:3px;
}

/* CARDS */
.card {
  background:rgba(255,250,244,.92);
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  box-shadow:0 14px 32px rgba(90,55,30,.13);
  margin-bottom:16px;
}

.hidden { display:none; }

h2 {
  margin:0 0 16px;
  font-size:24px;
}

/* MODE */
.mode {
  display:grid;
  grid-template-columns:1fr 1fr;
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  margin-bottom:18px;
  background:#f8eadb;
}

.mode button {
  border:0;
  padding:14px 8px;
  font-size:16px;
  font-weight:900;
  background:transparent;
  color:var(--text);
}

.mode button.active {
  background:linear-gradient(160deg,var(--accent2),var(--accent));
  color:white;
}

/* FORM */
label {
  display:block;
  font-size:20px;
  font-weight:900;
  margin:16px 0 8px;
}

select, input, button {
  width:100%;
  font-size:18px;
  border-radius:16px;
  border:1px solid var(--line);
  padding:15px;
  background:#fffdf9;
  color:var(--text);
}

select {
  font-weight:700;
}

.input-wrap {
  position:relative;
}

.input-wrap input {
  padding-right:58px;
}

.input-unit {
  position:absolute;
  right:17px;
  top:50%;
  transform:translateY(-50%);
  font-weight:900;
  color:var(--muted);
}

.main-btn {
  margin-top:18px;
  border:none;
  background:linear-gradient(160deg,var(--accent2),var(--accent));
  color:white;
  font-weight:950;
  font-size:20px;
  box-shadow:0 8px 18px rgba(190,90,40,.25);
  cursor:pointer;
}

.secondary {
  border:1px solid var(--line);
  background:#f9eadb;
  color:var(--text);
  font-weight:900;
  margin-top:14px;
}

.danger {
  background:var(--danger);
  color:white;
  border:none;
  font-weight:900;
}

/* PATH */
.path {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:20px 0 8px;
}

.path-pill {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:13px 10px;
  border-radius:999px;
  background:#f6dfca;
  font-size:18px;
  font-weight:950;
}

.path-arrow {
  font-size:32px;
  font-weight:900;
}

/* RESULT */
.result {
  min-height:165px;
  background:linear-gradient(160deg,#fff1e2,#fde0c5);
  border:1px solid #e9c39f;
  border-radius:24px;
  padding:22px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  margin-bottom:16px;
}

.result-label {
  color:var(--accent-dark);
  font-weight:950;
  font-size:19px;
  margin-bottom:10px;
}

.big {
  font-size:64px;
  line-height:.95;
  font-weight:950;
  letter-spacing:-2px;
  color:#3a281d;
}

.unit {
  font-size:30px;
  font-weight:950;
  letter-spacing:0;
}

.small {
  color:var(--muted);
  font-size:15px;
  margin-top:10px;
  font-weight:700;
}

/* LISTS */
.clay-item, .history-item {
  background:#fffdf9;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin-top:10px;
}

.clay-item strong,
.history-clay {
  font-size:17px;
  font-weight:950;
}

.badge {
  background:#f4ddc8;
  color:var(--accent-dark);
  border-radius:999px;
  padding:6px 10px;
  font-size:13px;
  font-weight:950;
}

.history-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.history-phrase {
  font-size:16px;
  line-height:1.55;
}

.history-phrase strong {
  color:var(--accent-dark);
  font-size:18px;
}

.history-date {
  color:var(--muted);
  font-size:13px;
  margin-top:8px;
}

.tiny-btn {
  padding:9px 10px;
  font-size:13px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>
<main class="app">

<nav class="top-nav">
  <button class="nav-btn active" onclick="showPage('calc')" id="tabCalc">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M6 3h12v3c0 1.7-.9 3.2-2.2 4 1.9 1.1 3.2 3.2 3.2 5.5A5.5 5.5 0 0 1 13.5 21h-3A5.5 5.5 0 0 1 5 15.5c0-2.3 1.3-4.4 3.2-5.5A4.8 4.8 0 0 1 6 6V3Z"/></svg>
    </span>
    Calcul
  </button>

  <button class="nav-btn" onclick="showPage('clays')" id="tabClays">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2Z"/></svg>
    </span>
    Terres
  </button>

  <button class="nav-btn" onclick="showPage('history')" id="tabHistory">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 1-8.5 6H2l3.3-3.3L8.6 9H6.6A7 7 0 1 0 13 5V3Zm-1 5h2v5l4 2-.9 1.6-5.1-3V8Z"/></svg>
    </span>
    Historique
  </button>
</nav>

<section id="pageCalc">
  <div class="mode">
    <button id="modeFreshToFinal" class="active">Fraîche → 🏁 finale</button>
    <button id="modeFinalToFresh">🏁 finale → fraîche</button>
  </div>

  <div class="card">
    <label>Terre</label>
    <select id="claySelect"></select>

    <div class="path" id="pathInfo">
      <div class="path-pill">🏺 Fraîche</div>
      <div class="path-arrow">→</div>
      <div class="path-pill">🏁 Finale</div>
    </div>

    <label id="sizeLabel">Taille fraîche</label>
    <div class="input-wrap">
      <input id="sizeInput" type="number" inputmode="decimal" placeholder="Ex : 14">
      <span class="input-unit">cm</span>
    </div>

    <button class="main-btn" onclick="calculate()">▣ Calculer</button>
  </div>

  <div class="result" id="result">
    <div class="big">— <span class="unit">cm</span></div>
  </div>

  <button class="secondary" onclick="saveHistory()">♡ Enregistrer dans l’historique</button>
</section>

<section id="pageClays" class="card hidden">
  <h2>Mes terres</h2>

  <label>Nom de la terre</label>
  <input id="newClayName" placeholder="Ex : Grès blanc">

  <label>Retrait</label>
  <div class="input-wrap">
    <input id="newClayShrink" type="number" inputmode="decimal" placeholder="Ex : 12">
    <span class="input-unit">%</span>
  </div>

  <button class="main-btn" onclick="saveClay()">Ajouter / enregistrer</button>
  <div id="clayList"></div>
</section>

<section id="pageHistory" class="card hidden">
  <h2>Historique</h2>
  <button class="danger" onclick="clearHistory()">Vider l’historique</button>
  <div id="historyList"></div>
</section>

</main>

<script>
let mode = "freshToFinal";
let lastCalculation = null;

const defaultClays = [{ name: "Terre standard", shrink: 12 }];

function showPage(page) {
  document.getElementById("pageCalc").classList.toggle("hidden", page !== "calc");
  document.getElementById("pageClays").classList.toggle("hidden", page !== "clays");
  document.getElementById("pageHistory").classList.toggle("hidden", page !== "history");

  document.getElementById("tabCalc").classList.toggle("active", page === "calc");
  document.getElementById("tabClays").classList.toggle("active", page === "clays");
  document.getElementById("tabHistory").classList.toggle("active", page === "history");
}

function getClays() {
  return JSON.parse(localStorage.getItem("clays")) || defaultClays;
}

function setClays(clays) {
  localStorage.setItem("clays", JSON.stringify(clays));
}

function getHistory() {
  return JSON.parse(localStorage.getItem("history")) || [];
}

function setHistory(history) {
  localStorage.setItem("history", JSON.stringify(history));
}

function getSelectedClay() {
  const clays = getClays();
  return clays[document.getElementById("claySelect").value] || clays[0];
}

function renderClays() {
  const clays = getClays();
  const select = document.getElementById("claySelect");
  const list = document.getElementById("clayList");

  select.innerHTML = "";
  list.innerHTML = "";

  clays.forEach((clay, index) => {
    select.innerHTML += `<option value="${index}">${clay.name} — ${clay.shrink}%</option>`;
    list.innerHTML += `
      <div class="clay-item">
        <strong>${clay.name}</strong><br>
        Retrait : ${clay.shrink} %
        <button class="tiny-btn danger" onclick="deleteClay(${index})">Supprimer</button>
      </div>
    `;
  });
}

function saveClay() {
  const name = document.getElementById("newClayName").value.trim();
  const shrink = parseFloat(document.getElementById("newClayShrink").value);

  if (!name || isNaN(shrink) || shrink <= 0 || shrink >= 100) {
    alert("Entre un nom de terre et un retrait valide.");
    return;
  }

  const clays = getClays();
  const existing = clays.findIndex(c => c.name.toLowerCase() === name.toLowerCase());

  if (existing >= 0) clays[existing].shrink = shrink;
  else clays.push({ name, shrink });

  setClays(clays);
  document.getElementById("newClayName").value = "";
  document.getElementById("newClayShrink").value = "";
  renderClays();
  showPage("calc");
}

function deleteClay(index) {
  const clays = getClays();
  clays.splice(index, 1);
  setClays(clays.length ? clays : defaultClays);
  renderClays();
}

function setMode(newMode) {
  mode = newMode;

  document.getElementById("modeFreshToFinal").classList.toggle("active", mode === "freshToFinal");
  document.getElementById("modeFinalToFresh").classList.toggle("active", mode === "finalToFresh");

  document.getElementById("sizeLabel").textContent =
    mode === "freshToFinal" ? "Taille fraîche" : "Taille finale voulue";

  document.getElementById("pathInfo").innerHTML =
    mode === "freshToFinal"
      ? `<div class="path-pill">🏺 Fraîche</div><div class="path-arrow">→</div><div class="path-pill">🏁 Finale</div>`
      : `<div class="path-pill">🏁 Finale</div><div class="path-arrow">→</div><div class="path-pill">🏺 Fraîche</div>`;

  document.getElementById("result").innerHTML =
    `<div class="big">— <span class="unit">cm</span></div>`;
}

document.getElementById("modeFreshToFinal").onclick = () => setMode("freshToFinal");
document.getElementById("modeFinalToFresh").onclick = () => setMode("finalToFresh");

function calculate() {
  const size = parseFloat(document.getElementById("sizeInput").value);
  const clay = getSelectedClay();
  const shrink = clay.shrink;

  if (isNaN(size)) {
    alert("Entre une taille valide.");
    return;
  }

  const factor = 1 - shrink / 100;
  const result = Math.round((mode === "freshToFinal" ? size * factor : size / factor) * 100) / 100;
  const label = mode === "freshToFinal" ? "✨ Taille finale estimée" : "🏺 Taille fraîche à faire";

  document.getElementById("result").innerHTML = `
    <div class="result-label">${label}</div>
    <div class="big">${result} <span class="unit">cm</span></div>
    <div class="small">${clay.name} · retrait ${shrink} %</div>
  `;

  lastCalculation = {
    clay: clay.name,
    shrink,
    mode,
    input: size,
    result,
    date: new Date().toLocaleString("fr-FR")
  };
}

function saveHistory() {
  if (!lastCalculation) {
    alert("Fais d’abord un calcul.");
    return;
  }

  const history = getHistory();
  history.unshift(lastCalculation);
  setHistory(history.slice(0, 30));
  renderHistory();
  showPage("history");
}

function renderHistory() {
  const history = getHistory();
  const list = document.getElementById("historyList");

  if (!history.length) {
    list.innerHTML = `<p class="small">Aucun calcul enregistré.</p>`;
    return;
  }

  list.innerHTML = history.map(item => {
    const phrase = item.mode === "freshToFinal"
      ? `Taille fraîche <strong>${item.input} cm</strong><br>→ 🏁 Taille finale estimée <strong>${item.result} cm</strong>`
      : `🏁 Taille finale voulue <strong>${item.input} cm</strong><br>→ Taille fraîche à faire <strong>${item.result} cm</strong>`;

    return `
      <div class="history-item">
        <div class="history-top">
          <div class="history-clay">${item.clay}</div>
          <div class="badge">${item.shrink} %</div>
        </div>
        <div class="history-phrase">${phrase}</div>
        <div class="history-date">${item.date}</div>
      </div>
    `;
  }).join("");
}

function clearHistory() {
  if (confirm("Vider tout l’historique ?")) {
    localStorage.removeItem("history");
    renderHistory();
  }
}

renderClays();
renderHistory();
</script>
</body>
</html>
